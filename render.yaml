services:
  - type: web
    name: hr-manager-voice-assistant
    env: python
    rootDir: backend
    buildCommand: "bash render-build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: voicehr-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 1

databases:
  - name: voicehr-db
    databaseName: voicehr_db
    user: postgres
